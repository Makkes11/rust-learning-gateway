services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/config.toml:/config.toml
    environment:
      - RUST_LOG=info
    depends_on:
      mqtt:
        condition: service_healthy
      modbus-sim:
        condition: service_started

  modbus-sim:
    image: oitc/modbus-server
    container_name: modbus-sim
    ports:
      - "5020:5020"
    volumes:
      - ./gateway/modbus.json:/modbus.json
    command: ["-f", "/modbus.json"]
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./gateway/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped