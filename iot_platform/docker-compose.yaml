services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/config.toml:/config.toml
    environment:
      - RUST_LOG=info
    depends_on:
      mqtt:
        condition: service_healthy
      modbus-sim:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  telemetry:
    build:
      context: .
      dockerfile: telemetry/Dockerfile
    container_name: telemetry
    environment:
      - RUST_LOG=debug
      - MQTT_Host=Mqtt
      - MQTT_Port=1883
      - DATABASE_URL=postgres://telemetry_user:telemetry_pass@postgres:5432/telemetry_db
    depends_on:
      gateway:
        condition: service_healthy
      mqtt:
        condition: service_healthy
      modbus-sim:
        condition: service_started

  modbus-sim:
    image: oitc/modbus-server
    container_name: modbus-sim
    ports:
      - "5020:5020"
    volumes:
      - ./gateway/modbus.json:/modbus.json
    command: ["-f", "/modbus.json"]
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./gateway/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: telemetry-postgres
    restart: always
    environment:
      POSTGRES_USER: telemetry_user
      POSTGRES_PASSWORD: telemetry_pass
      POSTGRES_DB: telemetry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./telemetry/db/init:/docker-entrypoint-initdb.d/

volumes:
  postgres_data: