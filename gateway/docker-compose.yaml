services:
  gateway:
    build: .
    container_name: gateway
    ports:
      - "8080:8080"   # expose API outside container
    volumes:
      - ./config.toml:/config.toml
    environment:
      - RUST_LOG=info
    depends_on:
      mqtt:
        condition: service_healthy
      modbus-sim:
        condition: service_started

  modbus-sim:
    image: oitc/modbus-server
    container_name: modbus-sim
    ports:
      - "5020:5020"   # expose Modbus server outside container
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped